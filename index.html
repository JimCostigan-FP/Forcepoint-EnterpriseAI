<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forcepoint Enterprise AI</title>
    <meta name="theme-color" content="#042C53" />
    <link rel="icon" type="image/png" href="/fp-icon.png" />
    <link rel="apple-touch-icon" href="/fp-icon.png" />
    <link rel="shortcut icon" type="image/png" href="/fp-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Resolve theme before React mounts so the page doesn't flash the
         wrong palette on first paint. Mirrors src/lib/theme.js logic. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('iris.theme');
          var pick = (stored === 'light' || stored === 'dark')
            ? stored
            : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          if (pick === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', pick === 'dark' ? '#0A0E14' : '#042C53');
        } catch (e) { /* private mode — fall through to light */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
